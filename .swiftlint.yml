swift_version: "6.2"
strict: true

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - implicit_return
  - modifier_order
  - prefer_self_type_over_type_of_self
  - redundant_type_annotation
  - sorted_imports
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - private_over_fileprivate
  - closure_spacing
  - collection_alignment
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - vertical_parameter_alignment_on_call

disabled_rules:
  - todo
  - trailing_whitespace
  - opening_brace

included:
  - Sources

excluded:
  - .build
  - .derived
  - DerivedData

line_length:
  warning: 120
  error: 200

file_length:
  warning: 500
  error: 1200

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length: 2
  excluded: [id, x, y, r, g, b]

nesting:
  type_level: 2
  function_level: 3

reporter: xcode
